<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>全球资金流动与经济数据 | Capital Flows & Economics</title>
<style>
/* ========== 设计系统 ========== */
:root{
  --bg-primary:#020617;
  --bg-secondary:#0f172a;
  --bg-tertiary:#1e293b;
  --surface:rgba(15,23,42,0.78);
  --surface-elevated:rgba(30,41,59,0.6);
  --surface-hover:rgba(30,41,59,0.6);
  --border:rgba(148,163,184,0.08);
  --border-subtle:rgba(148,163,184,0.05);
  --border-active:rgba(59,130,246,0.45);
  --accent:#3b82f6;
  --accent-soft:#60a5fa;
  --accent-glow:rgba(59,130,246,0.3);
  --accent-glow-strong:rgba(59,130,246,0.5);
  --inflow:#06b6d4;
  --inflowsoft:#22d3ee;
  --outflow:#f59e0b;
  --outflow-soft:#fbbf24;
  --positive:#10b981;
  --positive-soft:#34d399;
  --negative:#ef4444;
  --negative-soft:#f87171;
  --text-primary:#f1f5f9;
  --text-secondary:#cbd5e1;
  --text-muted:#64748b;
  --text-dim:#475569;
  --radius-sm:6px;
  --radius-md:10px;
  --radius-lg:14px;
  --radius-xl:20px;
  --shadow-sm:0 2px 8px rgba(0,0,0,0.3);
  --shadow:0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg:0 8px 40px rgba(0,0,0,0.5);
  --shadow-glow:0 0 30px var(--accent-glow);
  --transition:0.2s cubic-bezier(0.4,0,0.2,1);
  --transition-slow:0.35s cubic-bezier(0.4,0,0.2,1);
  --transition-bounce:0.4s cubic-bezier(0.34,1.56,0.64,1);
}

/* ========== 基础重置 ========== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg-primary);
  color:var(--text-primary);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* 背景渐变修饰 */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 60% at 20% 0%,rgba(59,130,246,0.07) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 100%,rgba(139,92,46,0.04) 0%,transparent 50%);
}

/* ========== 星空背景 ========== */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite alternate}
@keyframes twinkle{
  0%{opacity:0.1;transform:scale(0.7)}
  50%{opacity:0.6}
  100%{opacity:1;transform:scale(1.2)}
}

/* ========== 应用容器 ========== */
#app{
  position:relative;z-index:1;
  display:grid;
  grid-template-rows:auto 1fr;
  height:100vh;
}

/* ========== 顶部导航栏 ========== */
.navbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 24px;
  background:linear-gradient(180deg,rgba(2,6,23,0.98) 0%,rgba(2,6,23,0.88) 100%);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px) saturate(1.2);
  z-index:100;
}
.nav-brand{display:flex;align-items:center;gap:12px}
.brand-icon{
  width:38px;height:38px;border-radius:var(--radius-md);
  background:linear-gradient(135deg,var(--accent),#8b5cf6);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 24px var(--accent-glow),inset 0 1px 0 rgba(255,255,255,0.15);
  transition:var(--transition);
}
.brand-icon:hover{box-shadow:0 0 32px var(--accent-glow-strong)}
.brand-text{font-size:17px;font-weight:700;letter-spacing:-0.4px}
.brand-text span{color:var(--accent);font-weight:600}
.brand-sub{font-size:9px;color:var(--text-muted);margin-top:-2px;letter-spacing:0.3px}

.nav-center{display:flex;align-items:center;gap:16px}
.nav-stat{display:flex;align-items:baseline;gap:6px;padding:4px 12px;border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--border)}
.nav-stat-val{font-size:14px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;line-height:1}
.nav-stat-lbl{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.6px}

.nav-actions{display:flex;gap:8px;align-items:center}
.nav-btn{
  padding:6px 12px;border-radius:var(--radius-sm);
  background:var(--surface);border:1px solid var(--border);
  color:var(--text-secondary);font-size:11px;font-weight:500;cursor:pointer;
  transition:var(--transition);
}
.nav-btn:hover{background:var(--surface-hover);color:var(--text-primary);border-color:var(--border-active)}

.refresh-timer{
  display:flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:var(--radius-sm);
  background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.18);
  font-size:11px;color:var(--positive);font-weight:500;
  cursor:pointer;transition:var(--transition);
}
.refresh-timer:hover{background:rgba(16,185,129,0.12);border-color:rgba(16,185,129,0.3)}
.refresh-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--positive);animation:pulse 1.5s ease-in-out infinite;
  box-shadow:0 0 6px rgba(16,185,129,0.5);
}
.live-dot{
  width:7px;height:7px;border-radius:50%;
  background:#f59e0b;animation:pulse 2s infinite;
  box-shadow:0 0 6px rgba(245,158,11,0.4);
}
.live-dot.active{background:var(--positive);box-shadow:0 0 6px rgba(16,185,129,0.5)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}

.data-status{
  display:flex;align-items:center;gap:8px;
  padding:6px 12px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);font-size:10px;
}
.data-status-info{color:var(--text-muted);flex:1}
.data-status-time{color:var(--accent);font-weight:600;font-variant-numeric:tabular-nums}

/* ========== 主内容区 ========== */
.main-content{
  display:grid;
  grid-template-columns:1fr 320px;
  overflow:hidden;
  position:relative;
  animation:fadeSlideIn 0.5s ease both;
}
@keyframes fadeSlideIn{
  from{opacity:0;transform:scale(0.99)}
  to{opacity:1;transform:scale(1)}
}

/* ========== 地图区域 ========== */
.map-section{position:relative;display:flex;align-items:center;justify-content:center}

/* 地图光晕 */
.map-glow{
  position:absolute;
  width:min(85vh,85vw);height:min(85vh,85vw);
  background:radial-gradient(circle,rgba(59,130,246,0.08) 0%,rgba(59,130,246,0.02) 40%,transparent 70%);
  border-radius:50%;pointer-events:none;
}
.map-glow-2{
  position:absolute;
  width:min(50vh,50vw);height:min(50vh,50vw);
  background:radial-gradient(circle,rgba(139,92,246,0.04) 0%,transparent 60%);
  border-radius:50%;pointer-events:none;
}

/* SVG地图 */
.map-svg{position:absolute;cursor:grab;will-change:transform;shape-rendering:geometricPrecision}
.map-svg:active{cursor:grabbing}

/* 国家样式 */
.country{
  fill:#0c1425;
  stroke:rgba(100,116,139,0.3);
  stroke-width:0.7px;
  stroke-linejoin:round;
  stroke-linecap:round;
  vector-effect:non-scaling-stroke;
  paint-order:stroke fill;
  transition:fill 0.2s ease,stroke 0.2s ease,opacity 0.2s ease,filter 0.2s ease;
  cursor:pointer;
}
.country:hover{
  fill:rgba(59,130,246,0.15);
  stroke:rgba(96,165,250,0.6);
  stroke-width:1.2px;
  filter:drop-shadow(0 0 4px rgba(59,130,246,0.3));
}
.country.active{
  fill:rgba(59,130,246,0.25);
  stroke:rgba(96,165,250,0.85);
  stroke-width:1.8px;
  filter:drop-shadow(0 0 8px rgba(59,130,246,0.4));
}
.country.dimmed{
  fill:rgba(15,23,42,0.4);
  opacity:0.3;
  stroke-width:0.4px;
}

/* 流动画布 */
.flow-canvas{position:absolute;inset:0;pointer-events:none}

/* 地图工具提示 */
.map-tooltip{
  position:fixed;padding:12px 16px;
  background:var(--surface);
  backdrop-filter:blur(20px) saturate(1.3);
  border:1px solid var(--border-active);
  border-radius:var(--radius-md);
  font-size:11px;pointer-events:none;
  opacity:0;transform:translateY(4px);
  transition:opacity 0.18s ease,transform 0.18s ease;
  z-index:50;min-width:170px;
  box-shadow:var(--shadow-lg);
}
.map-tooltip.visible{opacity:1;transform:translateY(0)}
.tt-title{font-weight:700;margin-bottom:8px;font-size:13px;letter-spacing:-0.2px}
.tt-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0}
.tt-lbl{color:var(--text-muted);font-size:10px}
.tt-val{font-weight:700;font-variant-numeric:tabular-nums}
.tt-val.in{color:var(--inflow)}
.tt-val.out{color:var(--outflow)}

/* ========== 底部控制栏 ========== */
.map-controls{
  position:absolute;bottom:22px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:20px;
  padding:12px 24px;
  background:var(--surface);
  backdrop-filter:blur(20px) saturate(1.2);
  border:1px solid var(--border);
  border-radius:var(--radius-xl);
  box-shadow:var(--shadow-lg);
  z-index:30;
  transition:var(--transition);
}
.map-controls{
  animation:slideUp 0.5s ease 0.3s both;
}
@keyframes slideUp{
  from{opacity:0;transform:translateX(-50%) translateY(20px)}
  to{opacity:1;transform:translateX(-50%) translateY(0)}
}
.map-controls:hover{
  border-color:var(--border-active);
  box-shadow:var(--shadow-lg),var(--shadow-glow);
}
.ctrl-group{display:flex;align-items:center;gap:10px}
.ctrl-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.6px;font-weight:500}
.ctrl-slider{
  width:110px;height:4px;
  -webkit-appearance:none;appearance:none;
  background:linear-gradient(90deg,var(--accent),var(--bg-tertiary));
  border-radius:3px;outline:none;
  cursor:pointer;
}
.ctrl-slider::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:16px;height:16px;border-radius:50%;
  background:var(--accent);cursor:pointer;
  box-shadow:0 0 10px var(--accent-glow),0 2px 6px rgba(0,0,0,0.3);
  transition:var(--transition-bounce);
  border:2px solid rgba(255,255,255,0.15);
}
.ctrl-slider::-webkit-slider-thumb:hover{
  transform:scale(1.25);
  box-shadow:0 0 14px var(--accent-glow-strong),0 2px 8px rgba(0,0,0,0.4);
}
.ctrl-val{font-size:11px;font-weight:700;color:var(--accent);min-width:55px;font-variant-numeric:tabular-nums}

/* ========== 右侧面板 ========== */
.side-panel{
  background:var(--surface);
  backdrop-filter:blur(20px) saturate(1.2);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
  animation:slideInRight 0.4s ease 0.15s both;
}
@keyframes slideInRight{
  from{opacity:0;transform:translateX(20px)}
  to{opacity:1;transform:translateX(0)}
}

/* 面板头部 */
.panel-head{padding:14px 18px 0;border-bottom:1px solid var(--border)}
.panel-title{font-size:15px;font-weight:700;margin-bottom:2px;letter-spacing:-0.3px}
.panel-sub{font-size:10px;color:var(--text-muted);margin-bottom:14px;font-weight:500}

/* 统计卡片 */
.stats-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  padding:14px 18px;
  border-bottom:1px solid var(--border-subtle);
}
.stat-card{
  padding:14px 12px;
  background:rgba(2,6,23,0.4);
  border-radius:var(--radius-md);
  text-align:center;
  transition:var(--transition);
}
.stat-card:hover{background:rgba(2,6,23,0.6);transform:translateY(-1px)}
.stat-card.in{border:1px solid rgba(6,182,212,0.15)}
.stat-card.out{border:1px solid rgba(245,158,11,0.15)}
.stat-card.positive{border:1px solid rgba(16,185,129,0.15)}
.stat-card.negative{border:1px solid rgba(239,68,68,0.15)}
.stat-card-lbl{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.6px;font-weight:500}
.stat-card-val{font-size:18px;font-weight:700;margin-top:6px;letter-spacing:-0.5px;font-variant-numeric:tabular-nums}
.stat-card.in .stat-card-val{color:var(--inflow)}
.stat-card.out .stat-card-val{color:var(--outflow)}
.stat-card.positive .stat-card-val{color:var(--positive)}
.stat-card.negative .stat-card-val{color:var(--negative)}

/* ========== 标签导航 ========== */
.tab-nav{
  display:flex;
  padding:0 12px;
  border-bottom:1px solid var(--border);
  background:rgba(2,6,23,0.4);
}
.tab-btn{
  flex:1;
  padding:11px 4px;
  background:transparent;
  border:none;
  border-bottom:2px solid transparent;
  color:var(--text-muted);
  font-size:11px;
  font-weight:600;
  cursor:pointer;
  transition:var(--transition);
  white-space:nowrap;
  letter-spacing:0.2px;
}
.tab-btn:hover{color:var(--text-secondary);border-bottom-color:var(--border)}
.tab-btn.active{
  color:var(--accent);
  border-bottom-color:var(--accent);
}

/* ========== 面板内容区 ========== */
.panel-body{flex:1;overflow-y:auto;padding:18px}
.tab-panel{display:none;animation:fadeIn 0.25s ease}
.tab-panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* 分组标题 */
.section-hd{
  display:flex;align-items:center;gap:8px;
  font-size:10px;font-weight:600;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:0.8px;
  padding:14px 0 10px;
  margin-bottom:8px;
  border-top:1px solid var(--border-subtle);
}
.section-hd:first-of-type{border-top:none;padding-top:0}
.section-hd::before{
  content:'';width:3px;height:14px;
  background:linear-gradient(180deg,var(--accent),rgba(59,130,246,0.4));
  border-radius:2px;
}

/* 资金列表 */
.flow-items{display:flex;flex-direction:column;margin-bottom:20px}
.flow-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 6px;
  border-bottom:1px solid var(--border-subtle);
  font-size:11px;
  transition:var(--transition);
  border-radius:var(--radius-sm);
}
.flow-row:last-child{border-bottom:none}
.flow-row:hover{background:rgba(59,130,246,0.05);padding-left:10px}
.flow-route{display:flex;align-items:center;gap:8px}
.flow-pip{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.flow-pip.in{background:var(--inflow);box-shadow:0 0 4px rgba(6,182,212,0.4)}
.flow-pip.out{background:var(--outflow);box-shadow:0 0 4px rgba(245,158,11,0.4)}
.flow-country{color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px;font-weight:500}
.flow-amt{font-weight:700;font-variant-numeric:tabular-nums}
.flow-amt.in{color:var(--inflow)}
.flow-amt.out{color:var(--outflow)}

/* ========== 图表容器 ========== */
.chart-container{
  position:relative;
  margin:10px 0 18px;
  background:rgba(2,6,23,0.4);
  border-radius:var(--radius-md);
  border:1px solid var(--border);
  overflow:hidden;
  transition:var(--transition);
}
.chart-container:hover{border-color:var(--border-active)}
.chart-container canvas{
  display:block;
  width:100%;
}
.chart-title{
  font-size:11px;
  font-weight:600;
  color:var(--text-secondary);
  padding:10px 14px 4px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  letter-spacing:0.2px;
}
.chart-badge{
  font-size:9px;
  padding:2px 8px;
  border-radius:10px;
  background:rgba(59,130,246,0.1);
  color:var(--accent);
  font-weight:600;
}

/* ========== 数据行 ========== */
.data-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:9px 12px;
  margin:3px 0;
  border-radius:var(--radius-sm);
  font-size:11px;
  background:rgba(2,6,23,0.25);
  border:1px solid transparent;
  transition:var(--transition);
}
.data-row:hover{
  background:rgba(59,130,246,0.05);
  border-color:rgba(59,130,246,0.12);
}
.data-name{color:var(--text-secondary);font-weight:500}
.data-values{display:flex;align-items:center;gap:10px}
.data-price{font-weight:600;color:var(--text-primary);font-variant-numeric:tabular-nums}
.data-change{font-weight:600;font-variant-numeric:tabular-nums;font-size:10px;padding:2px 7px;border-radius:var(--radius-sm)}
.data-change.positive{color:var(--positive-soft);background:rgba(16,185,129,0.1)}
.data-change.negative{color:var(--negative-soft);background:rgba(239,68,68,0.1)}

/* ========== 经济对比表格 ========== */
.econ-table{width:100%;border-collapse:collapse;font-size:10px}
.econ-table th{
  text-align:left;
  padding:7px 10px;
  color:var(--text-muted);
  font-weight:600;
  border-bottom:1px solid var(--border);
  text-transform:uppercase;
  letter-spacing:0.6px;
  font-size:9px;
}
.econ-table td{
  padding:8px 10px;
  border-bottom:1px solid var(--border-subtle);
  font-variant-numeric:tabular-nums;
}
.econ-table tr:hover td{background:rgba(59,130,246,0.04)}
.econ-country{color:var(--text-primary);font-weight:600}
.econ-val{color:var(--text-secondary)}
.econ-val.pos{color:var(--positive)}
.econ-val.neg{color:var(--negative)}

/* ========== 加载动画 ========== */
.loader-overlay{
  position:fixed;inset:0;
  background:var(--bg-primary);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:1000;transition:opacity 0.5s ease,visibility 0.5s ease;
}
.loader-overlay.hidden{opacity:0;pointer-events:none;visibility:hidden}
.loader-ring{
  position:relative;
  width:48px;height:48px;
  border:3px solid rgba(59,130,246,0.12);
  border-top-color:var(--accent);
  border-right-color:rgba(59,130,246,0.35);
  border-radius:50%;
  animation:spin 0.9s cubic-bezier(0.5,0.1,0.5,0.9) infinite;
  box-shadow:0 0 20px var(--accent-glow);
}
.loader-ring::after{
  content:'';position:absolute;inset:5px;
  border:2px solid transparent;
  border-bottom-color:rgba(139,92,246,0.5);
  border-left-color:rgba(139,92,246,0.2);
  border-radius:50%;
  animation:spin 1.4s linear infinite reverse;
}
.loader-text{margin-top:16px;font-size:12px;color:var(--text-muted);font-weight:500;letter-spacing:0.5px}
.loader-text::after{content:'...';animation:dots 1.5s steps(4) infinite}
@keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}100%{content:'...'}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ========== 响应式适配 ========== */
@media(max-width:1024px){
  .main-content{grid-template-columns:1fr 280px}
  .nav-center{display:none}
}
@media(max-width:768px){
  .main-content{grid-template-columns:1fr;grid-template-rows:1fr auto}
  .side-panel{
    border-left:none;border-top:1px solid var(--border);
    max-height:50vh;
  }
  .navbar{padding:10px 16px}
  .brand-text{font-size:15px}
  .brand-sub{display:none}
  .map-controls{bottom:14px;padding:10px 18px}
  .ctrl-slider{width:80px}
  .tab-btn{font-size:10px;padding:9px 2px}
}
@media(max-width:480px){
  .nav-brand .brand-text span{display:inline}
  .map-controls{gap:12px;padding:10px 16px}
  .ctrl-label{display:none}
  .stats-grid{grid-template-columns:1fr 1fr;gap:6px}
  .stat-card{padding:10px 8px}
  .stat-card-val{font-size:15px}
  .tab-btn{font-size:9px;padding:8px 2px}
}

/* ========== 滚动条 ========== */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(148,163,184,0.15);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(148,163,184,0.3)}
*{scrollbar-width:thin;scrollbar-color:rgba(148,163,184,0.15) transparent}
</style>
</head>
<body>
<div class="loader-overlay"><div class="loader-ring"></div><div class="loader-text">加载中...</div></div>
<div id="stars"></div>
<div id="app">
  <nav class="navbar">
    <div class="nav-brand">

function generateBilateralFlows() {
const countries = Object.keys(FUND_FLOW_DATA.countries);
const flows = [];
countries.forEach(from => {
countries.forEach(to => {
if (from === to) return;
const f = FUND_FLOW_DATA.countries[from];
const t = FUND_FLOW_DATA.countries[to];
const dist = Math.sqrt(Math.pow(f.lat - t.lat, 2) + Math.pow(f.lng - t.lng, 2));
const distFactor = Math.max(0.02, Math.min(1, 25 / dist));
const massFactor = (f.totalOutward * t.totalInward) / 1e8;
const fdiFlow = Math.round(massFactor * distFactor * 0.4 * (0.6 + Math.random() * 0.8));
const portfolioFlow = Math.round(massFactor * distFactor * 0.35 * (0.6 + Math.random() * 0.8));
const bankFlow = Math.round(massFactor * distFactor * 0.25 * (0.6 + Math.random() * 0.8));
if (fdiFlow > 5) flows.push({ from, to, type: "fdi", amount: fdiFlow });
if (portfolioFlow > 5) flows.push({ from, to, type: "portfolio", amount: portfolioFlow });
if (bankFlow > 5) flows.push({ from, to, type: "lending", amount: bankFlow });
});
});
return flows;
}

<script>
function makeProj(w,h){
  // 等距圆柱投影：经度[-180,180]→x[0,w]，纬度[90,-90]→y[0,h]
  return function(ll){
    var lo=ll[0],la=ll[1];
    var x=((lo+180)/360)*w;
    var y=((90-la)/180)*h;
    return [x,y];
  };
}
// 生成SVG路径
function makePath(proj,w,h){
  return function(f){
    function ring(r){
      var d='',prevX=null,shift=0;
      for(var i=0;i<r.length;i++){
        var pp=proj(r[i]);
        var p=[pp[0]+shift,pp[1]];
        // 日期变更线穿越检测：水平位移超半宽时进行连续性位移修正
        if(prevX!==null&&Math.abs(p[0]-prevX)>w*0.5){
          // 向东跨越（坐标从大变小时）：保持右侧连续性，shift+w
          // 向西跨越（坐标从小变大时）：保持左侧连续性，shift-w
          if(p[0]<prevX){ shift+=w; p[0]+=w; }
          else { shift-=w; p[0]-=w; }
        }
        d+=(d?'L':'M')+p[0].toFixed(2)+','+p[1].toFixed(2);
        prevX=p[0];
      }
      return d+'Z';
    }
    if(f.geometry.type==='Polygon')return ring(f.geometry.coordinates[0]);
    if(f.geometry.type==='MultiPolygon'){
      var d='';
      f.geometry.coordinates.forEach(function(p){d+=ring(p[0])});
      return d;
    }
    return '';
  };
}

function initZoom(el){
  var t={x:0,y:0,k:1},active=false,lx=0,ly=0;
  el.addEventListener('wheel',function(e){
    e.preventDefault();
    var d=e.deltaY>0?0.92:1.08;
    var nk=Math.max(1,Math.min(10,t.k*d));
    var r=el.getBoundingClientRect();
    var mx=e.clientX-r.left,my=e.clientY-r.top;
    t.x=mx-(mx-t.x)*nk/t.k;
    t.y=my-(my-t.y)*nk/t.k;
    t.k=nk;
  },{passive:false});
  el.addEventListener('mousedown',function(e){active=true;lx=e.clientX;ly=e.clientY});
  window.addEventListener('mouseup',function(){active=false});
  window.addEventListener('mousemove',function(e){
    if(!active)return;
    t.x+=e.clientX-lx;t.y+=e.clientY-ly;
    lx=e.clientX;ly=e.clientY;
  });
  return {get:function(){return t}};
}

// 垂直柱状图（商品/指数涨跌）
function drawBarChart(canvasId, data, labels, valueFormatter) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  var W = rect.width, H = rect.height;
  var padding = { top: 20, right: 10, bottom: 30, left: 10 };
  var chartW = W - padding.left - padding.right;
  var chartH = H - padding.top - padding.bottom;

  ctx.clearRect(0, 0, W, H);

  var values = Object.values(data);
  var maxVal = Math.max.apply(null, values.map(function(v){ return Math.abs(v); }));
  if (maxVal === 0) maxVal = 1;

  var barW = Math.min(24, (chartW / values.length) * 0.6);
  var gap = (chartW - barW * values.length) / (values.length + 1);
  var zeroY = padding.top + chartH / 2;

  // 中轴线
  ctx.strokeStyle = 'rgba(148,163,184,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(padding.left, zeroY);
  ctx.lineTo(W - padding.right, zeroY);
  ctx.stroke();

  values.forEach(function(v, i) {
    var x = padding.left + gap + i * (barW + gap);
    var barH = (Math.abs(v) / maxVal) * (chartH / 2 - 4);
    var y = v >= 0 ? zeroY - barH : zeroY;

    // 渐变色
    var grad = ctx.createLinearGradient(x, y, x, y + barH);
    if (v >= 0) {
      grad.addColorStop(0, '#10b981');
      grad.addColorStop(1, 'rgba(16,185,129,0.3)');
    } else {
      grad.addColorStop(0, 'rgba(239,68,68,0.3)');
      grad.addColorStop(1, '#ef4444');
    }
    ctx.fillStyle = grad;
    
    // 圆角矩形
    var r = Math.min(3, barW / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + barW - r, y);
    ctx.quadraticCurveTo(x + barW, y, x + barW, y + r);
    ctx.lineTo(x + barW, y + barH - r);
    ctx.quadraticCurveTo(x + barW, y + barH, x + barW - r, y + barH);
    ctx.lineTo(x + r, y + barH);
    ctx.quadraticCurveTo(x, y + barH, x, y + barH - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.fill();

    // 标签
    ctx.fillStyle = '#64748b';
    ctx.font = '9px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(labels[i], x + barW / 2, H - 8);

    // 数值
    ctx.fillStyle = v >= 0 ? '#10b981' : '#ef4444';
    ctx.font = 'bold 8px Inter, sans-serif';
    var txt = (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
    ctx.fillText(txt, x + barW / 2, y - (v >= 0 ? 4 : -12));
  });
}

// 水平柱状图（外汇变化）
function drawHBarChart(canvasId, data, labels) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  var W = rect.width, H = rect.height;
  var padding = { top: 10, right: 50, bottom: 10, left: 60 };
  var chartH = H - padding.top - padding.bottom;

  ctx.clearRect(0, 0, W, H);

  var values = Object.values(data);
  var maxVal = Math.max.apply(null, values.map(function(v){ return Math.abs(v); }));
  if (maxVal === 0) maxVal = 1;

  var barH = Math.min(16, (chartH / values.length) * 0.6);
  var gap = (chartH - barH * values.length) / (values.length + 1);
  var zeroX = padding.left + (W - padding.left - padding.right) / 2;
  var chartW = W - padding.left - padding.right;

  values.forEach(function(v, i) {
    var y = padding.top + gap + i * (barH + gap);
    var barW = (Math.abs(v) / maxVal) * (chartW / 2 - 4);
    var x = v >= 0 ? zeroX : zeroX - barW;

    // 渐变
    var grad = ctx.createLinearGradient(x, y, x + barW, y);
    if (v >= 0) {
      grad.addColorStop(0, 'rgba(16,185,129,0.3)');
      grad.addColorStop(1, '#10b981');
    } else {
      grad.addColorStop(0, '#ef4444');
      grad.addColorStop(1, 'rgba(239,68,68,0.3)');
    }
    ctx.fillStyle = grad;
    
    var r = Math.min(3, barH / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + barW - r, y);
    ctx.quadraticCurveTo(x + barW, y, x + barW, y + r);
    ctx.lineTo(x + barW, y + barH - r);
    ctx.quadraticCurveTo(x + barW, y + barH, x + barW - r, y + barH);
    ctx.lineTo(x + r, y + barH);
    ctx.quadraticCurveTo(x, y + barH, x, y + barH - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.fill();

    // 标签
    ctx.fillStyle = '#94a3b8';
    ctx.font = '9px Inter, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(labels[i], padding.left - 6, y + barH / 2 + 3);

    // 数值
    ctx.fillStyle = v >= 0 ? '#10b981' : '#ef4444';
    ctx.font = 'bold 8px Inter, sans-serif';
    ctx.textAlign = v >= 0 ? 'left' : 'right';
    var txt = (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
    var txtX = v >= 0 ? zeroX + barW + 4 : zeroX - barW - 4;
    ctx.fillText(txt, txtX, y + barH / 2 + 3);
  });

  // 中轴
  ctx.strokeStyle = 'rgba(148,163,184,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(zeroX, padding.top - 2);
  ctx.lineTo(zeroX, H - padding.bottom + 2);
  ctx.stroke();
}

  /* 渲染地图 */
  function render(){
    var g=document.getElementById('countries');
    g.innerHTML='';
    var world=topojson.feature(MAP_DATA,MAP_DATA.objects.countries);
    var paths=[];
    world.features.forEach(function(f){
      var p=document.createElementNS('http://www.w3.org/2000/svg','path');
      p.setAttribute('d',path(f));
      p.setAttribute('class','country');
      p.setAttribute('data-name',f.properties.name);
      p.dataset.name=f.properties.name;
      p.style.opacity='0';
      p.style.transition='opacity 0.4s ease';
      // 台湾是中国不可分割的一部分
      if(f.properties.name === 'Taiwan' || f.properties.name === '中国台湾') {
        p.addEventListener('click',function(){selectCountry('China')});
      } else {
        p.addEventListener('click',function(){selectCountry(f.properties.name)});
      }
      p.addEventListener('mouseenter',function(e){showTooltip(e,f.properties.name)});
      p.addEventListener('mouseleave',hideTooltip);
      g.appendChild(p);
      paths.push(p);
    });
    // 入场动画：依次淡入
    paths.forEach(function(p,i){
      setTimeout(function(){p.style.opacity='1'},30+i*8);
    });
    filterFlows();
  }

  /* 过滤 */
  function filterFlows(){
    state.filtered=AF.filter(function(f){return f.amount>=state.minAmt});
    initParticles();
  }

  /* 粒子 */
  function initParticles(){
    parts=[];
    var n=Math.min(200,state.filtered.length*2);
    for(var i=0;i<n;i++){
      var f=state.filtered[Math.floor(Math.random()*state.filtered.length)];
      if(!f)continue;
      var a=C[f.from],b=C[f.to];
      if(!a||!b)continue;
      var fp=proj([a.lng,a.lat]),tp=proj([b.lng,b.lat]);
      if(!fp||!tp)continue;
      var mx=(fp[0]+tp[0])/2,my=(fp[1]+tp[1])/2-Math.min(35,80/(Math.abs(fp[0]-tp[0])||1)*12);
      parts.push({t:Math.random(),sp:0.003+Math.random()*0.006,mid:[mx,my],fp:fp,tp:tp,big:f.amount>200});
    }
  }

  /* 绘制 */
  function draw(t){
    // 同步变换 SVG 和 Canvas
    svg.style.transform='translate('+t.x+'px,'+t.y+'px) scale('+t.k+')';
    svg.style.transformOrigin='center center';
    cx.clearRect(0,0,W,H);
    cx.save();
    cx.translate(t.x,t.y);
    cx.scale(t.k,t.k);

    state.filtered.forEach(function(f){
      var a=C[f.from],b=C[f.to];
      if(!a||!b)return;
      var fp=proj([a.lng,a.lat]),tp=proj([b.lng,b.lat]);
      if(!fp||!tp)return;
      var sel=state.sel,active=(sel===f.from||sel===f.to);

      if(sel&&!active){
        cx.strokeStyle='rgba(30,41,59,0.25)';cx.globalAlpha=0.25;
      }else{
        cx.globalAlpha=sel?(active?0.85:0.04):0.5;
        var g=cx.createLinearGradient(fp[0],fp[1],tp[0],tp[1]);
        if(sel===f.to){g.addColorStop(0,'#06b6d4');g.addColorStop(1,'#0891b2')}
        else if(sel===f.from){g.addColorStop(0,'#f59e0b');g.addColorStop(1,'#d97706')}
        else{g.addColorStop(0,'rgba(59,130,246,0.5)');g.addColorStop(1,'rgba(139,92,246,0.3)')}
        cx.strokeStyle=g;
      }
      cx.lineWidth=Math.max(0.4,Math.min(3,f.amount/180))/t.k;
      var mx=(fp[0]+tp[0])/2,my=(fp[1]+tp[1])/2-Math.min(35,80/(Math.abs(fp[0]-tp[0])||1)*12);
      cx.beginPath();cx.moveTo(fp[0],fp[1]);cx.quadraticCurveTo(mx,my,tp[0],tp[1]);cx.stroke();
    });

    /* 粒子 */
    parts.forEach(function(p){
      p.t+=p.sp;if(p.t>1)p.t=0;
      var tt=p.t,mt=1-tt;
      var x=mt*mt*p.fp[0]+2*mt*tt*p.mid[0]+tt*tt*p.tp[0];
      var y=mt*mt*p.fp[1]+2*mt*tt*p.mid[1]+tt*tt*p.tp[1];
      cx.beginPath();cx.arc(x,y,p.big?2:1.2/t.k,0,6.28);
      cx.fillStyle=p.big?'#fbbf24':'#3b82f6';
      cx.shadowColor='rgba(59,130,246,0.6)';cx.shadowBlur=5;
      cx.fill();cx.shadowBlur=0;
    });

    cx.globalAlpha=1;cx.restore();
  }

  function animate(){
    starParallax();
    draw(zoomObj.get());
    animId=requestAnimationFrame(animate);
  }

  /* 国家选择 */
  function selectCountry(n){
    var l=findC(n);
    if(!l){deselect();return}
    if(state.sel===l.key){deselect();return}
    state.sel=l.key;
    // 中国台湾是中国不可分割的一部分 - 选中中国时同时高亮台湾
    var isChina = (l.key === 'China' || l.data.name === '中国' || n === 'China' || n === '中国');
    document.querySelectorAll('.country').forEach(function(p){
      var name = p.getAttribute('data-name') || p.dataset.name || '';
      var match = (name === n);
      if(isChina){
        match = match || (name === 'Taiwan') || (name === '中国台湾');
      }
      p.classList.toggle('active', match);
      p.classList.toggle('dimmed', !match);
    });
    filterFlows();
    showCountryDetail(l.key,l.data);
  }

  function deselect(){
    state.sel=null;
    document.querySelectorAll('.country').forEach(function(p){p.classList.remove('active','dimmed')});
    filterFlows();
    showOverview();
  }

  /* 面板 */
  function showOverview(){
    var tf=AF.reduce(function(s,f){return s+f.amount},0);
    var flows={};
    AF.forEach(function(f){if(!flows[f.from])flows[f.from]={out:0};flows[f.from].out+=f.amount});
    var top=Object.entries(flows).map(function(k){return[C[k[0]],k[1]]}).filter(function(x){return x[0]}).sort(function(a,b){return b[1]-a[1]}).slice(0,5);

    document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
    document.getElementById('btn-overview').classList.add('active');
    document.getElementById('panelTitle').textContent='全球资金流动';
    document.getElementById('panelSub').textContent='2025 · Capital Flows';

    var h='<div class="stats-grid">';
    h+='<div class="stat-card in"><div class="stat-card-lbl">总流量</div><div class="stat-card-val">$'+(tf/1000).toFixed(1)+'T</div></div>';
    h+='<div class="stat-card out"><div class="stat-card-lbl">活跃路径</div><div class="stat-card-val">'+AF.length+'</div></div>';
    h+='</div>';

    h+='<div class="section-hd">最大资金流出国</div><div class="flow-items">';
    top.forEach(function(x){
      h+='<div class="flow-row"><div class="flow-route"><span class="flow-pip out"></span><span class="flow-country">'+x[0].name+'</span></div><span class="flow-amt out">$'+x[1]+'B</span></div>';
    });
    h+='</div>';

    document.getElementById('overviewContent').innerHTML=h;
  }

  function showCountryDetail(key,c){
    var inf=AF.filter(function(f){return f.to===key}).sort(function(a,b){return b.amount-a.amount}).slice(0,5);
    var outf=AF.filter(function(f){return f.from===key}).sort(function(a,b){return b.amount-a.amount}).slice(0,5);
    var ti=inf.reduce(function(s,f){return s+f.amount},0);
    var to=outf.reduce(function(s,f){return s+f.amount},0);
    var net=ti-to;

    document.getElementById('panelTitle').textContent=c.name;
    document.getElementById('panelSub').textContent=c.region||'资金流动详情';

    var h='<div class="stats-grid">';
    h+='<div class="stat-card in"><div class="stat-card-lbl">总流入</div><div class="stat-card-val">$'+ti+'B</div></div>';
    h+='<div class="stat-card out"><div class="stat-card-lbl">总流出</div><div class="stat-card-val">$'+to+'B</div></div>';
    h+='</div>';

    h+='<div class="section-hd">净流入</div>';
    h+='<div style="font-size:20px;font-weight:700;color:'+(net>=0?'var(--inflow)':'var(--outflow)')+';margin-bottom:16px">'+(net>=0?'+':'')+'$'+net+'B</div>';

    h+='<div class="section-hd">主要来源</div><div class="flow-items">';
    inf.forEach(function(f){var s=C[f.from];h+='<div class="flow-row"><div class="flow-route"><span class="flow-pip in"></span><span class="flow-country">'+(s?s.name:f.from)+'</span></div><span class="flow-amt in">+$'+f.amount+'B</span></div>'});
    h+='</div>';

    h+='<div class="section-hd">主要去向</div><div class="flow-items">';
    outf.forEach(function(f){var d=C[f.to];h+='<div class="flow-row"><div class="flow-route"><span class="flow-pip out"></span><span class="flow-country">'+(d?d.name:f.to)+'</span></div><span class="flow-amt out">-$'+f.amount+'B</span></div>'});
    h+='</div>';

    document.getElementById('overviewContent').innerHTML=h;
  }

  /* 工具提示 */
  var tip=document.querySelector('.map-tooltip');
  function showTooltip(e,n){
    var l=findC(n);if(!l)return;
    var k=l.key;
    // 台湾是中国不可分割的一部分
    if(k==='Taiwan' || k==='中国台湾' || n==='Taiwan' || n==='中国台湾') {
      l={key:'China',data:C['China']||{name:'中国',code:'CHN'}};
      k='China';
    }
    var i1=AF.filter(function(f){return f.to===k}).reduce(function(s,f){return s+f.amount},0);
    var o1=AF.filter(function(f){return f.from===k}).reduce(function(s,f){return s+f.amount},0);
    tip.innerHTML='<div class="tt-title">'+l.data.name+'</div><div class="tt-row"><span class="tt-lbl">流入</span><span class="tt-val in">$'+i1+'B</span></div><div class="tt-row"><span class="tt-lbl">流出</span><span class="tt-val out">$'+o1+'B</span></div>';
    tip.classList.add('visible');
    var x=e.clientX+12,y=e.clientY+12;
    if(x+170>window.innerWidth)x=e.clientX-180;
    if(y+90>window.innerHeight)y=e.clientY-100;
    tip.style.left=x+'px';tip.style.top=y+'px';
  }
  function hideTooltip(){tip.classList.remove('visible')}

  /* 控制 */
  function initControls(){
    var slider=document.getElementById('amountSlider');
    slider.oninput=function(){
      state.minAmt=+this.value;
      document.getElementById('sliderVal').textContent='≥ $'+this.value+'B';
      filterFlows();
    };
  }

  /* 头部统计 */
  function updateHeaderStats(){
    var tf=AF.reduce(function(s,f){return s+f.amount},0);
    animValue('statTotal','$'+(tf/1000).toFixed(1)+'T');
    animValue('statFlows',AF.length);
    animValue('statCountries',Object.keys(C).length);
  }
  function animValue(id,val){
    var el=document.getElementById(id);if(!el)return;
    el.style.transition='opacity 0.2s,transform 0.2s';
    el.style.opacity='0.4';el.style.transform='translateY(-3px)';
    setTimeout(function(){el.textContent=val;el.style.opacity='1';el.style.transform='translateY(0)'},150);
  }

  /* 启动 */
  init();
})();
</script>
</body>
</html>
